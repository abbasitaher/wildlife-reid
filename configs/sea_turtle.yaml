dataset:
  name: sea_turtle
  root: data/turtles-data/data
  metadata_csv: metadata_splits.csv
  split_column: split_open
  gallery_split: train
  query_split: test
  path_column: file_name
  identity_column: identity

model:
  backbone: megadescriptor_l_384
  embedding_dim: null
  image_size: null
  checkpoint: artifacts/sea_turtle/checkpoints/best.pt
  pretrained: true

index:
  top_k: 5
  metric: cosine

paths:
  artifacts: artifacts/sea_turtle

training:
  batch_size: 16
  epochs: 30
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  arcface_margin: 0.5
  arcface_scale: 64.0
  max_per_category: 20
  seed: 71
  val_ratio: 0.1
