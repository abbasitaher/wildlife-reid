# Example config for a dataset organized as one folder per individual:
#
#   <root>/<source>/<identity>/<image>.jpg
#
# Use this layout when you do not have a metadata CSV. Each subfolder name under
# a source directory is treated as an individual's identity.

dataset:
  name: example
  root: data/example
  datasets:
    - source_a
    - source_b
  layout: folder_per_identity
  auto_split: true
  gallery_split: train
  query_split: test

model:
  backbone: megadescriptor_l_384
  embedding_dim: null
  image_size: null
  checkpoint: null
  pretrained: true

index:
  top_k: 5
  metric: cosine

paths:
  artifacts: artifacts/example

training:
  batch_size: 16
  epochs: 30
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  arcface_margin: 0.5
  arcface_scale: 64.0
  max_per_category: 20
  seed: 71
  val_ratio: 0.1
