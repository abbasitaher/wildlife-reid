dataset:
  name: frog
  root: data/frogdatasets
  datasets:
    - nfl
    - evz
    - abc
    - vancouver
  layout: folder_per_identity
  auto_split: true
  gallery_split: train
  query_split: test

model:
  backbone: megadescriptor_l_384
  embedding_dim: null
  image_size: null
  checkpoint: artifacts/frog/checkpoints/best.pt
  pretrained: true

index:
  top_k: 5
  metric: cosine

paths:
  artifacts: artifacts/frog

training:
  batch_size: 16
  epochs: 30
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  arcface_margin: 0.5
  arcface_scale: 64.0
  max_per_category: 20
  seed: 71
  val_ratio: 0.1
